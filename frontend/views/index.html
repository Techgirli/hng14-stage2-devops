<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Job Dashboard</title>
  <style>
    body { font-family: sans-serif; max-width: 600px; margin: 40px auto; padding: 0 20px; }
    button { padding: 10px 20px; cursor: pointer; }
    #result { margin-top: 20px; padding: 10px; background: #f4f4f4; border-radius: 4px; }
    #jobs { margin-top: 20px; }
    .job { padding: 8px; border-bottom: 1px solid #ddd; }
  </style>
</head>
<body>
  <h1>Job Processor Dashboard</h1>
  <button onclick="submitJob()">Submit New Job</button>
  <div id="result"></div>
  <div id="jobs"></div>

  <script>
    const jobIds = [];

    async function submitJob() {
      const btn = document.querySelector('button');
      btn.disabled = true;

      document.getElementById('result').innerText = "Submitting job..."; 

      try {
        const res = await fetch('/submit', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' }, 
          body: JSON.stringify({})
        });

        if (!res.ok) {
          throw new Error("Request failed");
        }

        const data = await res.json();

        if (!data.job_id) { // Fix 3: validate job_id exists
          throw new Error("Invalid response: missing job_id");
        }

        document.getElementById('result').innerText = `Submitted: ${data.job_id}`;
        jobIds.push(data.job_id); 
        pollJob(data.job_id, 0);
      } catch (err) {
        document.getElementById('result').innerText = `Failed to submit job: ${err.message}`; 
      } finally {
        btn.disabled = false;
      }
    }

    async function pollJob(id, retries = 0) {
      const MAX_RETRIES = 10;

      try {
        const res = await fetch(`/status/${id}`);
        const data = await res.json();

        const status = data.status || "unknown"; 
        renderJob(id, status);

        if (status !== 'completed' && status !== 'failed') { 
          if (retries < MAX_RETRIES) { 
            setTimeout(() => pollJob(id, retries + 1), 2000);
          } else {
            renderJob(id, "timed out — max retries reached");
          }
        }
      } catch (err) {
        console.error("Polling failed", err); 
      }
    }

    function renderJob(id, status) {
      const safeId = `job-${id}`;
      let el = document.getElementById(safeId);
      if (!el) {
        el = document.createElement('div');
        el.className = 'job';
        el.id = safeId;
        document.getElementById('jobs').appendChild(el);
      }
      const shortId = String(id).substring(0, 8);
      el.innerText = `Job ${shortId}... — ${status}`;
    }
  </script>
</body>
</html>
