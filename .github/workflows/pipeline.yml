name: HNG Stage 2 CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Python lint (flake8)
        run: |
          pip install flake8
          flake8 api/ worker/ --max-line-length=100

      - name: JS lint (eslint)
        run: |
          cd frontend
          npm ci
          npx eslint .

      - name: Dockerfile lint (hadolint)
        run: |
          wget -qO hadolint https://github.com/hadolint/hadolint/releases/latest/download/hadolint-Linux-x86_64
          chmod +x hadolint
          ./hadolint api/Dockerfile
          ./hadolint worker/Dockerfile
          ./hadolint frontend/Dockerfile

  test:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run API unit tests
        run: |
          pip install pytest pytest-cov fastapi httpx redis fakeredis
          cd api
          pytest tests/ --cov=. --cov-report=xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: api/coverage.xml

  build:
    needs: test
    runs-on: ubuntu-latest
    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000
    steps:
      - uses: actions/checkout@v4

      - name: Build and push images
        run: |
          docker build -t localhost:5000/api:${{ github.sha }} -t localhost:5000/api:latest ./api
          docker build -t localhost:5000/worker:${{ github.sha }} -t localhost:5000/worker:latest ./worker
          docker build -t localhost:5000/frontend:${{ github.sha }} -t localhost:5000/frontend:latest ./frontend
          docker push localhost:5000/api:${{ github.sha }}
          docker push localhost:5000/worker:${{ github.sha }}
          docker push localhost:5000/frontend:${{ github.sha }}

  security:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Scan with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: localhost:5000/api:latest
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL
          exit-code: 1

      - name: Upload Trivy results
        uses: actions/upload-artifact@v4
        with:
          name: trivy-results
          path: trivy-results.sarif

  integration:
    needs: security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Start full stack
        run: |
          cp .env.example .env
          docker compose up -d --build
          sleep 10

      - name: Submit job and poll for completion
        run: |
          JOB=$(curl -sf -X POST http://localhost:3000/jobs -H "Content-Type: application/json" -d '{"task":"test"}')
          JOB_ID=$(echo $JOB | python3 -c "import sys,json; print(json.load(sys.stdin)['id'])")
          for i in $(seq 1 30); do
            STATUS=$(curl -sf http://localhost:3000/jobs/$JOB_ID | python3 -c "import sys,json; print(json.load(sys.stdin)['status'])")
            if [ "$STATUS" = "completed" ]; then echo "Job completed!"; exit 0; fi
            sleep 2
          done
          echo "Job never completed"; exit 1

      - name: Tear down
        if: always()
        run: docker compose down -v

  deploy:
    needs: integration
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Rolling deploy
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
        run: |
          echo "$DEPLOY_KEY" > key.pem
          chmod 600 key.pem
          ssh -i key.pem -o StrictHostKeyChecking=no ubuntu@$DEPLOY_HOST << 'EOF'
            cd ~/hng14-stage2-devops
            git pull
            docker compose pull
            docker compose up -d --no-deps --build api
            # This is a waiting health check
            for i in $(seq 1 12); do
              if docker compose ps api | grep healthy; then
                echo "Deploy successful"
                exit 0
              fi
              sleep 5
            done
            echo "Health check failed, aborting"
            exit 1
          EOF
