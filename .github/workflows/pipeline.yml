name: HNG Stage 2 CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:

jobs:

  # ---------------- LINT ----------------
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Python lint
      - name: Python lint (flake8)
        run: |
          pip install flake8
          flake8 api/ worker/ --max-line-length=100

      # JS lint
      - name: JS lint (eslint)
        run: |
          cd frontend
          npm install
          npx eslint .

      # Docker lint
      - name: Dockerfile lint (hadolint)
        run: |
          wget -qO hadolint https://github.com/hadolint/hadolint/releases/latest/download/hadolint-Linux-x86_64
          chmod +x hadolint
          ./hadolint api/Dockerfile
          ./hadolint worker/Dockerfile
          ./hadolint frontend/Dockerfile


  # ---------------- TEST ----------------
  test:
    needs: lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies and run tests
        run: |
          pip install pytest pytest-cov fastapi httpx fakeredis
          cd api
          pytest tests/ --cov=. --cov-report=xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: api/coverage.xml


  # ---------------- BUILD ----------------
  build:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build images
        run: |
          docker build -t api:${{ github.sha }} ./api
          docker build -t worker:${{ github.sha }} ./worker
          docker build -t frontend:${{ github.sha }} ./frontend


  # ---------------- SECURITY SCAN ----------------
  security:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Scan API image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: api:${{ github.sha }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL
          exit-code: 1

      - name: Upload Trivy results
        uses: actions/upload-artifact@v4
        with:
          name: trivy-results
          path: trivy-results.sarif


  # ---------------- INTEGRATION TEST ----------------
  integration:
    needs: security
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Start full stack
        run: |
          docker compose up -d --build
          sleep 15

      - name: Health check API
        run: |
          curl -f http://localhost:8000/health

      - name: Submit job and verify completion
        run: |
          RESPONSE=$(curl -s -X POST http://localhost:8000/jobs \
            -H "Content-Type: application/json" \
            -d '{"task":"test"}')

          JOB_ID=$(echo $RESPONSE | python3 -c "import sys,json; print(json.load(sys.stdin)['job_id'])")

          echo "Job ID: $JOB_ID"

          for i in $(seq 1 30); do
            STATUS=$(curl -s http://localhost:8000/jobs/$JOB_ID \
              | python3 -c "import sys,json; print(json.load(sys.stdin)['status'])")

            echo "Status: $STATUS"

            if [ "$STATUS" = "completed" ]; then
              echo "Job completed successfully"
              exit 0
            fi

            sleep 2
          done

          echo "Job did not complete in time"
          exit 1

      - name: Tear down stack
        if: always()
        run: docker compose down -v


  # ---------------- DEPLOY ----------------
  deploy:
    needs: integration
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH (rolling update)
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}

        run: |
          echo "$DEPLOY_KEY" > key.pem
          chmod 600 key.pem

          ssh -i key.pem -o StrictHostKeyChecking=no ubuntu@$DEPLOY_HOST << 'EOF'

            cd ~/hng14-stage2-devops

            git pull origin main

            docker compose down

            docker compose up -d --build

            # health check loop
            for i in $(seq 1 12); do
              if curl -f http://localhost:8000/health; then
                echo "Deployment successful"
                exit 0
              fi
              sleep 5
            done

            echo "Deployment failed - rolling back"
            docker compose down
            exit 1

          EOF
