name: HNG Stage 2 CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Python lint (flake8)
        run: |
          pip install flake8
          flake8 api/ worker/ --max-line-length=100

      - name: JS lint (eslint)
        run: |
          cd frontend
          npm install
          npx eslint .

      - name: Dockerfile lint (hadolint)
        run: |
          wget -qO hadolint https://github.com/hadolint/hadolint/releases/latest/download/hadolint-Linux-x86_64
          chmod +x hadolint
          ./hadolint api/Dockerfile
          ./hadolint worker/Dockerfile
          ./hadolint frontend/Dockerfile

  test:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies and run tests
        run: |
          pip install pytest pytest-cov fastapi httpx fakeredis redis uvicorn
          cd api
          pytest tests/ --cov=. --cov-report=xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: api/coverage.xml

  build:
    needs: test
    runs-on: ubuntu-latest
    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: network=host

      - name: Cache Docker layers
        uses: actions/cache@v3
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Build and push images to local registry
        run: |
          docker buildx build --cache-from type=local,src=/tmp/.buildx-cache \
            --cache-to type=local,dest=/tmp/.buildx-cache-new,mode=max \
            -t localhost:5000/api:${{ github.sha }} -t localhost:5000/api:latest \
            --push ./api
          docker buildx build --cache-from type=local,src=/tmp/.buildx-cache \
            --cache-to type=local,dest=/tmp/.buildx-cache-new,mode=max \
            -t localhost:5000/worker:${{ github.sha }} -t localhost:5000/worker:latest \
            --push ./worker
          docker buildx build --cache-from type=local,src=/tmp/.buildx-cache \
            --cache-to type=local,dest=/tmp/.buildx-cache-new,mode=max \
            -t localhost:5000/frontend:${{ github.sha }} -t localhost:5000/frontend:latest \
            --push ./frontend
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

  security:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build images for scanning
        run: |
          docker build -t api:${{ github.sha }} ./api
          docker build -t worker:${{ github.sha }} ./worker
          docker build -t frontend:${{ github.sha }} ./frontend

      - name: Scan API image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: api:${{ github.sha }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL
          exit-code: 0

      - name: Upload Trivy results
        uses: actions/upload-artifact@v4
        with:
          name: trivy-results
          path: trivy-results.sarif

  integration:
    needs: security
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create .env file
        run: cp .env.example .env

      - name: Start full stack
        run: |
          docker compose up -d --build
          sleep 20

      - name: Health check frontend
        run: curl -f http://localhost:3000/

      - name: Submit job and verify completion
        run: bash scripts/integration-test.sh
        timeout-minutes: 2

      - name: Tear down stack
        if: always()
        run: docker compose down -v

  deploy:
    needs: integration
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH rolling update
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
        run: |
          if [ -z "$DEPLOY_HOST" ] || [ -z "$DEPLOY_KEY" ]; then
            echo "Deploy secrets not configured - skipping deploy"
            exit 0
          fi
          echo "$DEPLOY_KEY" > key.pem
          chmod 600 key.pem
          ssh -i key.pem -o StrictHostKeyChecking=no ubuntu@$DEPLOY_HOST << 'EOF'
            cd ~/hng14-stage2-devops
            git pull origin main
            docker compose up -d --no-deps --build api
            for i in $(seq 1 12); do
              if docker compose ps api | grep healthy; then
                echo "Deployment successful"
                exit 0
              fi
              sleep 5
            done
            echo "Health check failed - aborting"
            exit 1
          EOF